    <text x="444" y="175">Roboshop</text>
    <text x="704" y="175">Dock</text>
    <text x="956" y="175">RDS</text>
    <text x="142" y="378">Assembly</text>
    <text x="478" y="378">Core</text>
    <text x="860" y="378">Outbound</text>
    <text x="146" y="562">Charge</text>
    <text x="488" y="562">Fleet</text>
    <text x="872" y="562">Shipping</text>
  </g>
  <g fill="#38bdf8" opacity="0.75">
    <circle cx="170" cy="270" r="7"/>
    <circle cx="520" cy="270" r="7"/>
    <circle cx="850" cy="270" r="7"/>
    <circle cx="290" cy="465" r="7"/>
    <circle cx="610" cy="465" r="7"/>
