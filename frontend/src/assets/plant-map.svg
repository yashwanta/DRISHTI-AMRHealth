<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Sample plant floor layout</title>
  <desc id="desc">Dark industrial floor map with zones, aisles, docks, and production cells.</desc>
  <rect width="1200" height="700" fill="#111827"/>
  <rect x="40" y="40" width="1120" height="620" rx="22" fill="#182033" stroke="#334155" stroke-width="3"/>
  <g fill="#202b42" stroke="#475569" stroke-width="2">
    <rect x="90" y="90" width="230" height="150" rx="10"/>
    <rect x="360" y="90" width="260" height="150" rx="10"/>
    <rect x="660" y="90" width="210" height="150" rx="10"/>
    <rect x="910" y="90" width="190" height="150" rx="10"/>
    <rect x="90" y="300" width="270" height="130" rx="10"/>
    <rect x="420" y="300" width="250" height="130" rx="10"/>
    <rect x="740" y="300" width="360" height="130" rx="10"/>
    <rect x="90" y="500" width="260" height="100" rx="10"/>
    <rect x="410" y="500" width="300" height="100" rx="10"/>
    <rect x="780" y="500" width="320" height="100" rx="10"/>
  </g>
  <g stroke="#64748b" stroke-width="2" stroke-dasharray="10 10" opacity="0.7">
